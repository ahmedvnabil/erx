  <g transform="translate(904 74)" font-family="system-ui,sans-serif"><rect width="272" height="46" fill="#111715" stroke="#45534d"/><text x="18" y="29" fill="#75827c" font-size="12">Search sources...</text><g transform="translate(0 66)"><rect width="272" height="88" fill="#17221d" stroke="#59df8b"/><rect width="4" height="88" fill="#59df8b"/><text x="18" y="28" fill="#edf1ea" font-size="13" font-weight="700">Presidency of Egypt</text><text x="18" y="51" fill="#8f9b95" font-size="10">Official · 455 documents</text><text x="18" y="72" fill="#59df8b" font-size="10">HEALTHY / HTML</text></g><g transform="translate(0 164)"><rect width="272" height="88" fill="#0d1210" stroke="#27322e"/><text x="18" y="28" fill="#edf1ea" font-size="13" font-weight="700">Cabinet of Egypt</text><text x="18" y="51" fill="#8f9b95" font-size="10">Official · public records</text><text x="18" y="72" fill="#e8c45b" font-size="10">CATALOGUED</text></g><g transform="translate(0 262)"><rect width="272" height="88" fill="#0d1210" stroke="#27322e"/><text x="18" y="28" fill="#edf1ea" font-size="13" font-weight="700">CAPMAS</text><text x="18" y="51" fill="#8f9b95" font-size="10">Statistics · live data</text><text x="18" y="72" fill="#6ea8fe" font-size="10">API</text></g><g transform="translate(0 360)"><rect width="272" height="88" fill="#0d1210" stroke="#27322e"/><text x="18" y="28" fill="#edf1ea" font-size="13" font-weight="700">Egyptian news index</text><text x="18" y="51" fill="#8f9b95" font-size="10">News · multiple publishers</text><text x="18" y="72" fill="#59df8b" font-size="10">SEARCHABLE</text></g></g>
  <g transform="translate(34 76)" font-family="system-ui,sans-serif"><text fill="#59df8b" font-family="ui-monospace,monospace" font-size="10" letter-spacing="1.7">SELECTED SOURCE / OFFICIAL</text><text y="48" fill="#edf1ea" font-size="34" font-weight="680">Presidency of Egypt</text><text y="76" fill="#8f9b95" font-size="12">Original publications, preserved metadata, and collection health.</text><rect x="674" y="10" width="138" height="38" fill="none" stroke="#59df8b"/><text x="743" y="34" fill="#59df8b" font-size="11" font-weight="700" text-anchor="middle">VISIT SOURCE ↗</text>
    <g transform="translate(0 106)" font-family="ui-monospace,monospace" font-size="11" font-weight="700"><text x="14" y="24" fill="#7f8c86">OVERVIEW</text><text x="128" y="24" fill="#edf1ea">CONTENT</text><text x="226" y="24" fill="#7f8c86">COLLECTION HEALTH</text><path d="M112 39H204" stroke="#59df8b" stroke-width="3"/></g>
    <g transform="translate(0 164)"><text y="18" fill="#edf1ea" font-size="14" font-weight="700">24 recent documents</text><g transform="translate(594 0)" font-family="ui-monospace,monospace" font-size="10"><rect width="218" height="34" fill="#111715" stroke="#34413c"/><rect x="146" width="72" height="34" fill="#59df8b"><animate attributeName="x" values="0;0;73;73;146;146;0" keyTimes="0;.25;.28;.55;.58;.85;1" dur="9s" repeatCount="indefinite"/></rect><text x="36" y="21" fill="#edf1ea" text-anchor="middle">TABLE</text><text x="109" y="21" fill="#edf1ea" text-anchor="middle">GRID</text><text x="182" y="21" fill="#071009" text-anchor="middle">CANVAS</text></g></g>
    <g transform="translate(0 224)"><rect width="812" height="274" fill="#0a0f0d" stroke="#34413c"/><rect width="812" height="274" fill="url(#dots)"/><g transform="translate(326 102)"><rect width="160" height="70" fill="#142019" stroke="#59df8b"/><text x="80" y="29" fill="#edf1ea" font-size="13" font-weight="700" text-anchor="middle">SOURCE</text><text x="80" y="49" fill="#8f9b95" font-size="10" text-anchor="middle">24 documents</text></g><g fill="#111715" stroke="#46534d" font-family="system-ui,sans-serif" font-size="10"><rect x="46" y="38" width="190" height="60"/><rect x="570" y="36" width="190" height="60"/><rect x="54" y="186" width="190" height="60"/><rect x="562" y="184" width="190" height="60"/></g><g stroke="#3b4943"><path d="M236 68 326 122M570 66 486 122M244 216 326 152M562 214 486 152"/></g><g fill="#edf1ea" font-family="system-ui,sans-serif" font-size="11"><text x="60" y="64">Economic policy statement</text><text x="584" y="62">Presidential decree</text><text x="68" y="212">Public meeting summary</text><text x="576" y="210">Regional visit record</text></g><g fill="#7f8c86" font-family="ui-monospace,monospace" font-size="9"><text x="60" y="84">POLICY · ORIGINAL URL</text><text x="584" y="82">LEGAL · PUBLISHED DATE</text><text x="68" y="232">EVENT · ARCHIVED</text><text x="576" y="230">LOCATION · SOURCE</text></g></g>
  </g>
  <text x="34" y="626" fill="#75827c" font-family="ui-monospace,monospace" font-size="10">CLICK A SOURCE → OPEN ITS CONTENT → SWITCH TABLE / GRID / CANVAS</text><text x="1166" y="626" fill="#59df8b" font-family="ui-monospace,monospace" font-size="10" text-anchor="end">/sources ↗</text>
</svg>

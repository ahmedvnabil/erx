<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">ERX source explorer</title><desc id="desc">An animated product view showing sources, content tabs, and table, grid, and canvas research views.</desc>
  <defs><pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#26312d"/></pattern></defs>
  <rect width="1200" height="650" fill="#080b0a"/><rect x="1" y="1" width="1198" height="648" fill="none" stroke="#34413c"/>

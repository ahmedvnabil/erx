<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="بنية بحثية مفتوحة وموثقة المصدر للشأن المصري">
  <title>{% block title %}مرصد مصر البحثي{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 fill=%22%2357e389%22/><path d=%22M7 8h18v4H7zm0 7h18v4H7zm0 7h12v4H7z%22 fill=%22%230a0c0d%22/></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
</head>
<body class="bg-[#0a0c0d] text-[#eef0e8] min-h-screen">
  <header class="border-b-2 border-[#eef0e8]">
    <nav class="max-w-7xl mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-4" aria-label="التنقل الرئيسي">
      <a href="/" class="font-black text-xl tracking-tight">مرصد مصر البحثي <span class="text-[#57e389]">/ ERX</span></a>
      <div class="flex gap-5 text-sm font-bold">
        <a href="/">البحث</a><a href="/knowledge">المعرفة</a><a href="/sources">المصادر</a><a href="/methodology">المنهجية</a>
        <a href="/mcp" class="text-[#6ea8fe]">MCP</a>
      </div>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer class="max-w-7xl mx-auto px-4 py-8 mt-12 border-t border-[#42484c] text-xs text-[#9ca3a8] flex justify-between gap-4">
    <span>بنية معرفة مفتوحة — لا تمنح المصادر درجة حقيقة آلية.</span>
    <a href="/healthz">حالة الخدمة</a>
  </footer>
</body>
</html>

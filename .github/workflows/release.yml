name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.28"
      - run: uv sync --frozen --extra dev
      - run: uv run pytest
      - run: uv build
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

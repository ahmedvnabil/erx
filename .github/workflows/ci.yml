name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.28"
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check .
      - run: uv run pytest --cov=egypt_research_mcp --cov-report=term-missing
      - run: uv tool run pip-audit --strict
      - run: uv build

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: egypt-research-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker run --rm egypt-research-mcp:ci egypt-research-mcp init
